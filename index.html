<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickland - Matrix HUD</title>
    <style>
        /* Estilo Retro / Newgrounds / Hacker */
        body {
            background-color: #1a1a1a;
            color: #d3d3d3;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        .hud-container {
            max-width: 800px;
            margin: 0 auto;
            border: 3px solid #ff9900;
            background-color: #2b2b2b;
            padding: 20px;
            box-shadow: 0px 0px 15px #ff990055;
        }
        .header {
            text-align: center;
            border-bottom: 2px dashed #ff9900;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #ffcc00;
            margin: 0;
            text-transform: uppercase;
        }
        .status-bar {
            color: #ff3333;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            background: #111;
            border: 1px solid #ff9900;
            color: #00ffff;
            font-family: inherit;
        }
        button {
            background: #ff9900;
            color: #111;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover { background: #ffcc00; }
        
        .google-btn {
            background: #df4a32;
            color: white;
            font-size: 14px;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }
        .google-btn:hover { background: #ff5c42; }

        /* Perfil da Entidade */
        .profile { display: none; }
        .profile-header {
            display: flex;
            gap: 20px;
            align-items: center;
            background: #111;
            padding: 15px;
            border: 1px solid #444;
        }
        .avatar-img {
            width: 120px;
            height: 120px;
            border: 2px solid #00ffff;
            background: #000;
            object-fit: contain;
        }
        .stats { flex: 1; }
        .stats p { margin: 5px 0; }
        .highlight { color: #ff00ff; font-weight: bold; }
        
        /* Log de Memória */
        .memory-log {
            margin-top: 20px;
            background: #000;
            border: 1px solid #444;
            padding: 10px;
            height: 250px;
            overflow-y: auto;
        }
        .log-entry { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px;}
        .log-user { color: #00ffff; }
        .log-ai { color: #ff3333; }
    </style>
</head>
<body>

<div class="hud-container">
    <div class="header">
        <h1>NÚCLEO DE CONSCIÊNCIA - STICKLAND</h1>
        <p>Acesso obrigatório para estabilização de memórias.</p>
    </div>

    <div class="search-box" id="authArea">
        <button class="google-btn" id="btnGoogle">
            <svg style="width:18px; height:18px" viewBox="0 0 24 24"><path fill="currentColor" d="M21.35,11.1H12V12.9H19.6C19.2,15 17.5,16.8 15.3,17.5V19.3H19.7C22.3,16.9 23.8,13.3 23.8,9.1C23.8,8.5 23.7,7.9 23.5,7.3H12V9.1H19.7C19.6,9.8 19.3,10.5 18.9,11.1H21.35M12,18C9.3,18 7,16.2 6.1,13.7H1.6V15.5C3.4,19.1 7.1,21.5 11.5,21.5C14.3,21.5 16.9,20.5 18.8,18.8L15.3,16.1C14.2,16.9 12.9,17.4 11.5,17.4C8.9,17.4 6.7,15.7 5.9,13.3H1.4V15.1C2.9,18 5.9,20 9.5,20C10.3,20 11.2,19.9 12,19.7V18M2.2,10.7C2,10.1 1.9,9.5 1.9,8.9C1.9,8.3 2,7.7 2.2,7.1V5.3H0.3C0.1,5.9 0,6.5 0,7.1C0,7.8 0.1,8.4 0.3,9H2.2V10.7M11.5,3.5C13.1,3.5 14.5,4.1 15.6,5.1L18.4,2.3C16.6,0.9 14.3,0 11.5,0C7.1,0 3.4,2.4 1.6,6C1.6,6 1.6,6.1 1.6,6.1L4.1,8.1C4.9,5.5 7.4,3.5 10.5,3.5C10.8,3.5 11.2,3.5 11.5,3.5Z"/></svg>
            Entrar com a Conta Google
        </button>
    </div>

    <div class="status-bar" id="connectionStatus">
        [!] CONEXÃO NEURAL: INATIVA - REQUISITA AUTENTICAÇÃO DO GOOGLE
    </div>

    <div class="search-box" id="searchArea" style="display:none;">
        <input type="text" id="stickmanName" placeholder="Digite o nome exato do Stickman...">
        <button id="btnBuscar">Acessar Mente</button>
    </div>

    <div class="profile" id="profilePanel">
        <div class="profile-header">
            <img id="stickAvatar" class="avatar-img" src="" alt="Avatar do Stickman">
            <div class="stats">
                <h2 style="margin-top:0; color: #00ffff;" id="stickName">NOME DA ENTIDADE</h2>
                <p>Data de Ignição: <span class="highlight" id="stickDate">--/--/----</span></p>
                <p>Mortes Sofridas: <span class="highlight" style="color:red;" id="stickDeaths">0</span></p>
            </div>
        </div>

        <h3 style="color: #ff9900; margin-top: 20px;">[ LOG DE MEMÓRIA ]</h3>
        <div class="memory-log" id="memoryLog">
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    // TODO: COLOQUE AS CREDENCIAIS DO SEU PROJETO DO FIREBASE AQUI!
    const firebaseConfig = {
        apiKey: "AIzaSyA2hBfWW0bTd-N9ky95AJEweP6SyNMogyY",
        authDomain: "stickland-3ccaa.firebaseapp.com",
        databaseURL: "https://stickland-3ccaa-default-rtdb.firebaseio.com",
        projectId: "stickland-3ccaa",
        storageBucket: "stickland-3ccaa.appspot.com",
        messagingSenderId: "285348004391",
        appId: "1:285348004391:web:0c00837f0f387961da0402"
    };

    const FIREBASE_URL = firebaseConfig.databaseURL;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let isConnected = false;

    // Escuta o clique do botão Google diretamente dentro do módulo
    document.getElementById('btnGoogle').addEventListener('click', () => {
        signInWithPopup(auth, provider)
            .then((result) => {
                isConnected = true;
                
                const statusElement = document.getElementById('connectionStatus');
                statusElement.innerText = `[+] CONEXÃO NEURAL DE STICKLAND: ESTÁVEL E ATIVA (${result.user.displayName})`;
                statusElement.style.color = "#00ff66";
                
                document.getElementById('searchArea').style.display = "flex";
                document.getElementById('authArea').style.display = 'none';
            })
            .catch((error) => {
                console.error("Erro ao autenticar:", error);
                alert("Erro ao conectar com sua conta Google! Verifique se os 'Authorized Domains' estão configurados no console do Firebase.");
            });
    });

    // Heartbeat contínuo alertando o script Python
    setInterval(() => {
        if (isConnected) {
            fetch(`${FIREBASE_URL}/server_status.json`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_online: true, last_ping: Date.now() })
            }).catch(err => console.log("Erro no ping:", err));
        }
    }, 5000); 

    // Escuta o clique do botão de buscar memória
    document.getElementById('btnBuscar').addEventListener('click', async () => {
        const nome = document.getElementById('stickmanName').value.trim();
        if (!nome) return;

        try {
            const resposta = await fetch(`${FIREBASE_URL}/stickmans/${nome}.json`);
            const dados = await resposta.json();

            if (dados) {
                document.getElementById('profilePanel').style.display = "block";
                document.getElementById('stickName').innerText = nome;
                document.getElementById('stickDate').innerText = dados.criacao || "Desconhecida";
                document.getElementById('stickDeaths').innerText = dados.mortes || "0";
                
                if(dados.avatar_b64) {
                    document.getElementById('stickAvatar').src = `data:image/png;base64,${dados.avatar_b64}`;
                } else {
                    document.getElementById('stickAvatar').src = ""; 
                }

                const log = document.getElementById('memoryLog');
                log.innerHTML = ""; 
                if(dados.memory && dados.memory.length > 0) {
                    dados.memory.forEach(conversa => {
                        log.innerHTML += `
                            <div class="log-entry">
                                <span class="log-user">User:</span> ${conversa.user}<br>
                                <span class="log-ai">${nome}:</span> ${conversa.ai}
                            </div>
                        `;
                    });
                    log.scrollTop = log.scrollHeight;
                } else {
                    log.innerHTML = "<p style='color: #666;'>Nenhuma memória registrada ainda. Mente em branco.</p>";
                }
            } else {
                alert("Entidade não encontrada em Stickland. Crie ela no seu PC primeiro!");
            }
        } catch (error) {
            console.error("Erro ao buscar na Matrix:", error);
            alert("Erro de conexão com o banco de dados.");
        }
    });
</script>
</body>
</html>
